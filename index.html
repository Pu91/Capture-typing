        /* Side-by-side Ads Row Container */
        .ads-row {

            justify-content: center;

            gap: 20px;

            width: 100%;
        }

        /* 468x60 Ad Container Style */
        .ad-container {

            max-width: 468px;
            min-height: 60px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed #999;
            color: #555;
            overflow: hidden;
        }

        /* 160x300 Vertical Ad Container Style */
        .ad-vertical {
            width: 160px;
            min-height: 300px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed #999;
            color: #555;
            overflow: hidden;
        }

        /* Main Captcha Box Style */
        .main-box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        .balance-text {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .captcha-display {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            background: #e0e0e0;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            user-select: none;
            text-decoration: line-through;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #218838;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Main Earning Box -->
    <div class="main-box">
        <h2>Type & Earn</h2>
        <p class="balance-text">Balance: $<span id="balance">0.00</span></p>

        <div class="captcha-display" id="captchaText">Loading...</div>

        <input type="text" id="userInput" placeholder="Enter Captcha here">
        <button onclick="checkCaptcha()">Submit Captcha</button>

        <p id="message"></p>
    </div>

    <!-- Adsterra Bottom Banner Ad (468x60) -->

        <script>
            atOptions = {
                'key' : 'dd8eafafa06d3ed830a729e1f14e8860',

                'height' : 60,

            };
        </script>

    </div>

    <script>
        let currentCaptcha = "";
        let balance = 0.00;
        let perCaptchaRate = 0.01;

        function generateCaptcha() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
            let captcha = "";
            for (let i = 0; i < 6; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = captcha;
            document.getElementById("captchaText").innerText = captcha;
        }

        function checkCaptcha() {
            // Smart Link (Direct Link) 
            window.open("https://www.effectivecpmnetwork.com/nbpz6dvp1?key=2dbe251019027cec24664e7d4479206d", "_blank");

            const userInput = document.getElementById("userInput").value;
            const messageElement = document.getElementById("message");

            if (userInput === currentCaptcha) {
                balance += perCaptchaRate;
                document.getElementById("balance").innerText = balance.toFixed(2);
                messageElement.innerText = "Success! Reward added.";
                messageElement.style.color = "green";
                
                document.getElementById("userInput").value = "";
                generateCaptcha();
            } else {
                messageElement.innerText = "Incorrect Captcha! Try again.";
                messageElement.style.color = "red";
            }
        }

        window.onload = generateCaptcha;
    </script>
