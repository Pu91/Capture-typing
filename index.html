<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Earning Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Adsterra Banner Ad Container Style */
        .ad-container {
            width: 100%;
            max-width: 728px;
            height: 90px;
            background-color: #ddd;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed #999;
            color: #555;
        }

        /* Main Captcha Box Style */
        .main-box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        .balance-text {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .captcha-display {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            background: #e0e0e0;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            user-select: none;
            text-decoration: line-through;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #218838;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Adsterra Top Banner Ad -->
    <div class="ad-container">
        <p>Adsterra 728x90 Ad Banner (Paste script here)</p>
    </div>

    <!-- Main Earning Box -->
    <div class="main-box">
        <h2>Type & Earn</h2>
        <p class="balance-text">Balance: $<span id="balance">0.00</span></p>

        <div class="captcha-display" id="captchaText">Loading...</div>

        <input type="text" id="userInput" placeholder="Enter Captcha here">
        <button onclick="checkCaptcha()">Submit Captcha</button>

        <p id="message"></p>
    </div>

    <!-- Adsterra Bottom Banner Ad -->
    <div class="ad-container">
        <p>Adsterra 728x90 Ad Banner (Paste script here)</p>
    </div>

    <script>
        let currentCaptcha = "";
        let balance = 0.00;
        let perCaptchaRate = 0.01;

        function generateCaptcha() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
            let captcha = "";
            for (let i = 0; i < 6; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = captcha;
            document.getElementById("captchaText").innerText = captcha;
        }

        function checkCaptcha() {
            // Smart Link (Direct Link) ওপেন করার কোড
            window.open("https://www.effectivecpmnetwork.com/nbpz6dvp1?key=2dbe251019027cec24664e7d4479206d", "_blank");

            const userInput = document.getElementById("userInput").value;
            const messageElement = document.getElementById("message");

            if (userInput === currentCaptcha) {
                balance += perCaptchaRate;
                document.getElementById("balance").innerText = balance.toFixed(2);
                messageElement.innerText = "Success! Reward added.";
                messageElement.style.color = "green";
                
                document.getElementById("userInput").value = "";
                generateCaptcha();
            } else {
                messageElement.innerText = "Incorrect Captcha! Try again.";
                messageElement.style.color = "red";
            }
        }

        window.onload = generateCaptcha;
    </script>

    <!-- Adsterra Popunder Ad Script -->
    <script src="https://pl30140651.effectivecpmnetwork.com/fc/8b/a0/fc8ba07cddbe3d82f9274fa28d382598.js"></script>

    <!-- Adsterra Social Bar Ad Script -->
    <script src="https://pl30141745.effectivecpmnetwork.com/fb/72/56/fb72563253456a33b1eac2245bdd894b.js"></script>

</body>
</html>
